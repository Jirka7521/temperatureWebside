<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteorologický panel</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" href="webIcon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="webIcon.ico" type="image/x-icon">
</head>
<body class="bg-light">

    <!-- Main Container -->
    <div class="container-fluid p-3 dashboard-rows">

        <!-- Status card moved below temperature tiles (kept for later insertion) -->

        <!-- Row 2: Indoor Temperature & Humidity and Outdoor Temp & Rain Forecast -->
        <div class="row row-grow-1 g-3 mb-2">
            <!-- Indoor Temperature & Humidity Card -->
            <div class="col-12 col-md-6 d-flex">
                <div class="card text-center shadow flex-fill">
                    <div class="card-body">
                        <div class="responsive-title">Vnitřní teplota</div>
                        <div class="temp-humidity-container">
                            <!-- Temperature -->
                            <div class="text-center">
                                <div class="responsive-value" id="temperature">--°C</div>
                                <div class="text-muted">Teplota</div>
                            </div>
                            <!-- Humidity -->
                            <div class="text-center">
                                <div class="responsive-value" id="humidity">--%</div>
                                <div class="text-muted">Vlhkost</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Outdoor Weather Card -->
            <div class="col-12 col-md-6 d-flex">
                <div class="card text-center shadow flex-fill">
                    <div class="card-body">
                        <div class="responsive-title">Venkovní počasí</div>
                        <div class="forecast-container">
                            <!-- Outdoor Temperature -->
                            <div class="responsive-value" id="outdoor-temperature">--°C</div>
                            <!-- Rain Forecast -->
                            <div class="rain-forecast" id="rain-forecast">Žádná data o srážkách</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Row 2b: Full-width Status Card (between temps and chart) -->
        <div class="row g-2 mb-2 status-row">
            <div class="col-12">
                <div class="card shadow-sm status-card">
                    <div class="card-body d-flex flex-column flex-md-row align-items-center gap-2">
                        <div id="current-time" class="status-text flex-grow-1 text-center text-md-start">Načítání aktuálního času…</div>

                        <div class="theme-toggle mx-md-3">
                            <button id="themeButton" class="btn btn-sm btn-ghost" aria-label="Přepnout tmavý režim" title="Přepnout tmavý režim">
                                <span id="themeIcon" class="theme-icon" aria-hidden="true"></span>
                            </button>
                        </div>
                       

                        <div id="time-since" class="status-text flex-grow-1 text-center text-md-end">Načítání informací o aktualizaci…</div>
                    </div>
                </div>
            </div>
        </div>

    <!-- Row 3: Weather Chart (full width) -->
    <div class="row row-grow-3 g-3">
            <div class="col-12 d-flex">
                <div class="card shadow flex-fill">
                    <div class="card-body">
                        <div class="chart-container">
                            <!-- Weather Chart Canvas -->
                            <canvas id="weatherChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Bootstrap JS Bundle (with Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <!-- Custom JS Files -->
    <script src="utils.js"></script>
    <script src="darkmode.js"></script>
    <script src="config.js"></script>
    <script src="getValues.js"></script>
    <script src="chartSetup.js"></script>
    <!-- Flash logic moved into getValues.js -->
</body>
</html>
